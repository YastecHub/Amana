services:
  - type: web
    name: amana-api
    runtime: node
    region: frankfurt          # closest to Nigeria
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        value: file:./prod.db
      - key: JWT_SECRET
        generateValue: true    # Render auto-generates a secure random value
      - key: FRONTEND_URL
        sync: false            # Set this in Render dashboard to your Vercel URL
      - key: MONNIFY_API_KEY
        sync: false
      - key: MONNIFY_SECRET_KEY
        sync: false
      - key: MONNIFY_CONTRACT_CODE
        sync: false
      - key: MONNIFY_WALLET_ACCOUNT_NUMBER
        sync: false
      - key: MONNIFY_BASE_URL
        value: https://sandbox.monnify.com
      - key: GEMINI_API_KEY
        sync: false
      - key: API_BASE_URL
        sync: false            # Set to your Render service URL, e.g. https://amana-api.onrender.com
